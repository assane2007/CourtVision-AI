<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtVision AI — Skills Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card-bg: #111827;
            --border: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-violet: #7c3aed;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --font-mono: 'Space Mono', monospace;
            --font-syne: 'Syne', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-mono);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-family: var(--font-syne);
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--accent-violet), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.2rem 2rem;
            color: white;
            font-family: var(--font-mono);
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-family: var(--font-syne);
            font-size: 1.5rem;
            color: var(--accent-emerald);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-violet);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.1);
        }

        .card h3 {
            font-family: var(--font-syne);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--accent-cyan);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            border-radius: 2px;
            margin-top: 1.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.95);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 4px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 2rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="stat-item" style="position: absolute; top: 0; right: 0;">
                <span class="stat-value" id="total-count">0</span>
                <span class="stat-label">Skills</span>
            </div>
            <h1>Antigravity</h1>
            <p class="tagline">Explore the ultimate library of agentic skills</p>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="SEARCH SKILLS [CTRL+/]">
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value">939+</span>
                    <span class="stat-label">Ready to use</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">8</span>
                    <span class="stat-label">AI Tools</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">39</span>
                    <span class="stat-label">Contributors</span>
                </div>
            </div>
        </header>

        <div class="grid" id="skills-grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <div id="skill-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let allSkills = [];

        async function fetchSkills() {
            try {
                const response = await fetch('../skills_index.json');
                allSkills = await response.json();
                document.getElementById('total-count').textContent = allSkills.length;
                renderSkills(allSkills);
            } catch (err) {
                console.error("Failed to load skills index", err);
            }
        }

        function renderSkills(skills) {
            const grid = document.getElementById('skills-grid');
            grid.innerHTML = skills.map(skill => `
                <div class="card" onclick="openModal('${skill.id}')">
                    <h3>${skill.name || skill.id}</h3>
                    <p>${skill.description || skill.short_description || 'No description available.'}</p>
                    <div class="badge">${skill.tags ? skill.tags.split(',')[0] : 'General'}</div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const skill = allSkills.find(s => s.id === id);
            const modal = document.getElementById('skill-modal');
            const body = document.getElementById('modal-body');

            body.innerHTML = `
                <h1 style="font-size: 2rem; margin-bottom: 2rem;">${skill.name}</h1>
                <p style="margin-bottom: 2rem;">${skill.description}</p>
                <div style="border-top: 1px solid var(--border); padding-top: 2rem;">
                    <p><strong>Path:</strong> <code>skills/${skill.path}</code></p>
                    <p><strong>Author:</strong> ${skill.author || 'Community'}</p>
                </div>
            `;
            modal.style.display = 'block';
        }

        document.getElementById('close-modal').onclick = () => {
            document.getElementById('skill-modal').style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target == document.getElementById('skill-modal')) {
                document.getElementById('skill-modal').style.display = 'none';
            }
        };

        document.getElementById('search-input').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allSkills.filter(s =>
                (s.name && s.name.toLowerCase().includes(term)) ||
                (s.description && s.description.toLowerCase().includes(term)) ||
                (s.id.toLowerCase().includes(term))
            );
            renderSkills(filtered);
        };

        fetchSkills();
    </script>
</body>

</html>
