# docker-compose.yml — Services de développement local CourtVision AI
# Usage : docker compose up -d

version: '3.8'

services:
  # Redis — File d'attente BullMQ pour le traitement vidéo
  redis:
    image: redis:7-alpine
    container_name: courtvision-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
