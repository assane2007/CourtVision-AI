<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>CourtVision AI</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <script>
      // Error overlay for debugging web issues
      window.addEventListener('error', function(e) {
        var d = document.getElementById('__web_error_overlay') || document.createElement('pre');
        d.id = '__web_error_overlay';
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#1a0000;color:#ff4444;padding:20px;overflow:auto;font-size:14px;white-space:pre-wrap;';
        d.innerText = (d.innerText || '') + '\n---\n' + e.message + '\n' + (e.error && e.error.stack ? e.error.stack : '');
        if (!d.parentNode) document.body.appendChild(d);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('__web_error_overlay') || document.createElement('pre');
        d.id = '__web_error_overlay';
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#1a0000;color:#ff4444;padding:20px;overflow:auto;font-size:14px;white-space:pre-wrap;';
        d.innerText = (d.innerText || '') + '\n---\nUnhandled rejection: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
        if (!d.parentNode) document.body.appendChild(d);
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
