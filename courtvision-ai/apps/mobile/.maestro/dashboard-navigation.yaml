# E2E: Navigate all dashboard tabs
appId: com.courtvision.app
---
- launchApp
- tapOn: "Already a member"
- tapOn: "Manual Email Entry"
- tapOn: "name@domain.com"
- inputText: "e2e-test@courtvision.app"
- tapOn: "••••••••"
- inputText: "TestPass123!"
- tapOn: "TRANSMIT"

# Wait for dashboard
- assertVisible:
    text: "Court"
    timeout: 10000

# Navigate tabs
- tapOn:
    label: "Squad"
- assertVisible: "Squad"

- tapOn:
    label: "Twin"
- assertVisible: "Twin"

- tapOn:
    label: "Me"
- assertVisible: "Me"

# Back to Court
- tapOn:
    label: "Court"
- assertVisible: "Court"
