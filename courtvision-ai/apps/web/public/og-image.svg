<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A73E8"/>
      <stop offset="100%" style="stop-color:#00E676"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Basketball icon -->
  <circle cx="600" cy="250" r="80" fill="none" stroke="#1A73E8" stroke-width="4" opacity="0.3"/>
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="80" fill="#E6EDF3" text-anchor="middle">🏀</text>
  <!-- Title -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#E6EDF3" text-anchor="middle">CourtVision AI</text>
  <!-- Subtitle -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="24" fill="#8B949E" text-anchor="middle">Le coach IA qui te transforme. Pas juste qui te compte.</text>
  <!-- Accent line -->
  <rect x="450" y="480" width="300" height="4" rx="2" fill="url(#accent)"/>
  <!-- Features -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="18" fill="#8B949E" text-anchor="middle">Analyse Vidéo · Mental Score · Reconstruction 3D · Highlights Auto</text>
</svg>
