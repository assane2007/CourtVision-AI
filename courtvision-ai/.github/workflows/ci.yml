name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Typecheck
      run: npm run typecheck
      
    - name: Run Tests
      run: npm run test
      
    - name: Build Web App
      run: npm run build --workspace=apps/web
      
    - name: Build API
      run: npm run build --workspace=packages/api
