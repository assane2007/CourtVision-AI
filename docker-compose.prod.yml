# ============================================
# CourtVision AI — Docker Compose (Production)
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

version: '3.8'

services:
  app:
    build: .
    container_name: courtvision-ai-prod
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://courtvision:${POSTGRES_PASSWORD}@postgres:5432/courtvision
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://courtvision.app}
      - NODE_ENV=production
    volumes:
      - courtvision-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m" max-file:"5"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: courtvision-postgres-prod
    environment:
      POSTGRES_USER: courtvision
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: courtvision
    # No exposed ports — only accessible via internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtvision"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "10m" max-file:"3"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: courtvision-redis-prod
    # No exposed ports — only accessible via internal network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: "5m" max-file:"3"
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  courtvision-uploads:
    driver: local