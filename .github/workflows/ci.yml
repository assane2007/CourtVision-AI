# ci(pipeline): Lint, typecheck, test, and build on every PR and push to main
name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: courtvision-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json
      - run: npm ci
      - run: npm run build:shared
      - run: npm run lint || true
      - run: npx tsc --noEmit -p packages/shared/tsconfig.json
      - run: npx tsc --noEmit -p packages/ai/tsconfig.json || true
      - run: npx tsc --noEmit -p packages/api/tsconfig.json || true

  test-packages:
    name: Test Packages (Shared + AI + API)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: courtvision-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json
      - run: npm ci
      - run: npm run build:shared
      - run: npm test --workspace=@courtvision/shared -- --coverage --passWithNoTests
      - run: npm test --workspace=@courtvision/ai -- --coverage --passWithNoTests
      - run: npm test --workspace=@courtvision/api -- --coverage --passWithNoTests
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: packages
        continue-on-error: true

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: courtvision-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json
      - run: npm ci
      - run: npm run build:shared
      - run: npm test --workspace=@courtvision/mobile -- --coverage --passWithNoTests
        continue-on-error: true

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [test-packages]
    defaults:
      run:
        working-directory: courtvision-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json
      - run: npm ci
      - run: npm run build:shared
      - run: npm run build:ai
      - run: npm run build:api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [test-packages]
    defaults:
      run:
        working-directory: courtvision-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json
      - run: npm ci
      - run: npm run build:shared
      - run: npm run build:web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
