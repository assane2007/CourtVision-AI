name: PR Check
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          CHANGES=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $4}')
          if [ "$CHANGES" -gt 500 ]; then
            echo "⚠️ Large PR detected ($CHANGES lines changed). Consider splitting."
          fi

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [size-check]
    steps:
      - uses: actions/checkout@v4
      - name: Comment preview URL
        run: echo "Preview would be deployed at preview-${{ github.event.number }}.courtvision.com"