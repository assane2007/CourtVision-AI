# ci(deploy-web): Auto-deploy Web preview on PRs, production on merge to main
name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'courtvision-ai/apps/web/**'
      - 'courtvision-ai/packages/shared/**'
  pull_request:
    paths:
      - 'courtvision-ai/apps/web/**'
      - 'courtvision-ai/packages/shared/**'

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: courtvision-ai/apps/web
          github-comment: true

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: courtvision-ai/apps/web
