# CourtVision AI — Deploy Validation
# Manual trigger to validate the Docker build works end-to-end

name: Deploy (Validate Build)

on:
  workflow_dispatch:

jobs:
  validate-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Validate Docker build (builder stage only)
        run: |
          docker build \
            --target builder \
            -t courtvision-ai:validate \
            .