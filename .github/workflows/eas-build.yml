# ci(eas-build): Build mobile app via EAS on PRs and main
name: EAS Build

on:
  pull_request:
    paths:
      - 'courtvision-ai/apps/mobile/**'
      - 'courtvision-ai/packages/shared/**'
      - 'courtvision-ai/packages/ai/**'
      - 'courtvision-ai/package-lock.json'
      - 'courtvision-ai/package.json'
      - 'courtvision-ai/scripts/check-mobile-release.js'
  push:
    branches: [main]
    paths:
      - 'courtvision-ai/apps/mobile/**'
      - 'courtvision-ai/packages/shared/**'
      - 'courtvision-ai/packages/ai/**'
      - 'courtvision-ai/package-lock.json'
      - 'courtvision-ai/package.json'
      - 'courtvision-ai/scripts/check-mobile-release.js'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: courtvision-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: courtvision-ai/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: courtvision-ai

      - name: Validate mobile release configuration
        run: npm run check:mobile:release
        working-directory: courtvision-ai

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Preview build on PRs
      - name: Build preview
        if: github.event_name == 'pull_request'
        run: eas build --platform all --profile preview --non-interactive

      # Production build on main merge
      - name: Build production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform all --profile production --non-interactive
