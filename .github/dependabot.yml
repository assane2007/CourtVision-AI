version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/courtvision-ai"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/courtvision-ai/apps/mobile"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/courtvision-ai/apps/web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
